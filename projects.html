<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Abhishek Sattu</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── PAGE HEADER ─────────────────────────────────── */
    .page-header {
      background: var(--navy-dark);
      padding: 52px 48px 44px;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(42,108,184,0.3) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-header-inner {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .page-header h1 {
      font-family: var(--serif);
      font-size: clamp(32px, 5vw, 52px);
      color: #fff;
      line-height: 1.1;
      letter-spacing: -0.3px;
      animation: fadeUp 0.5s ease both;
    }

    .page-header h1 em {
      font-style: italic;
      color: rgba(255,255,255,0.45);
    }

    .page-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      margin-top: 10px;
      font-weight: 300;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    /* ── MAIN ────────────────────────────────────────── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── CONTROLS ────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 36px;
      align-items: center;
      animation: fadeUp 0.5s 0.15s ease both;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      fill: var(--muted);
      pointer-events: none;
    }

    #search {
      width: 100%;
      padding: 9px 12px 9px 34px;
      font-family: var(--mono);
      font-size: 12px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 5px;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--navy-light); }
    #search::placeholder { color: var(--muted); }

    #sort {
      padding: 9px 12px;
      font-family: var(--mono);
      font-size: 12px;
      background: var(--white);
      border: 1px solid var(--rule);
      border-radius: 5px;
      color: var(--ink);
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    #sort:focus { border-color: var(--navy-light); }

    /* ── FILTER PILLS ────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--rule);
      background: var(--white);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn:hover { border-color: var(--navy-light); color: var(--navy); }

    .filter-btn.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
    }

    .filter-btn .lang-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── SECTION LABEL ───────────────────────────────── */
    .section-label {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
      font-weight: 500;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── FEATURED GRID ───────────────────────────────── */
    #featured-section { margin-bottom: 48px; }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .repo-card {
      background: var(--white);
      border-radius: 6px;
      border: 1px solid rgba(27,79,138,0.08);
      box-shadow: 0 1px 8px rgba(27,79,138,0.06);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: box-shadow 0.2s, transform 0.2s;
      animation: fadeUp 0.4s ease both;
    }

    .repo-card:hover {
      box-shadow: 0 6px 24px rgba(27,79,138,0.13);
      transform: translateY(-2px);
    }

    .repo-card.featured {
      border-color: rgba(27,79,138,0.16);
      box-shadow: 0 2px 12px rgba(27,79,138,0.09);
    }

    .repo-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .repo-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--ink);
      line-height: 1.3;
    }

    .featured-badge {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent-bg);
      color: var(--navy);
      border: 1px solid rgba(27,79,138,0.15);
      padding: 2px 8px;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .repo-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
    }

    .repo-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .topic-tag {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--navy-light);
      background: var(--accent-bg);
      padding: 2px 8px;
      border-radius: 3px;
      border: 1px solid rgba(42,108,184,0.15);
    }

    .repo-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .repo-lang {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .lang-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .repo-stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .repo-stat svg {
      width: 12px;
      height: 12px;
      fill: var(--muted);
    }

    .repo-updated {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      margin-left: auto;
    }

    .repo-links {
      display: flex;
      gap: 10px;
      padding-top: 4px;
      border-top: 1px solid var(--rule);
    }

    .repo-link {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--navy);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }

    .repo-link:hover { color: var(--navy-light); }

    .repo-link svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* ── ALL REPOS GRID ──────────────────────────────── */
    #repos-section { }

    .repos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    /* ── SKELETON ────────────────────────────────────── */
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    .skeleton-card {
      background: var(--white);
      border-radius: 6px;
      border: 1px solid rgba(27,79,138,0.08);
      padding: 20px 22px;
      height: 160px;
    }

    .skeleton-line {
      border-radius: 3px;
      background: linear-gradient(90deg, #e8eef8 25%, #d4dff0 50%, #e8eef8 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite;
    }

    .sk-title  { height: 14px; width: 60%; margin-bottom: 14px; }
    .sk-desc1  { height: 11px; width: 100%; margin-bottom: 7px; }
    .sk-desc2  { height: 11px; width: 80%; margin-bottom: 20px; }
    .sk-lang   { height: 10px; width: 30%; }

    /* ── ERROR STATE ─────────────────────────────────── */
    #error-state {
      display: none;
      background: var(--white);
      border-radius: 6px;
      border: 1px solid rgba(27,79,138,0.08);
      padding: 40px;
      text-align: center;
    }

    #error-state p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: var(--mono);
    }

    #retry-btn {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 20px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #retry-btn:hover { background: var(--navy-light); }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 600px) {
      .page-header { padding: 36px 24px 32px; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-wrap { min-width: unset; }
      .featured-grid, .repos-grid, .skeleton-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

      <div class="skeleton-card"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-desc1"></div><div class="skeleton-line sk-desc2"></div><div class="skeleton-line sk-lang"></div></div>
